<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Smart Infrastructure Intelligence Platform</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: url('https://thumbs.dreamstime.com/b/artificial-intelligence-ai-digital-technology-future-virtual-concept-vector-illustration-background-innovation-117486040.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Dark overlay for readability */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 30, 0.75);
        }

        /* Main Title */
        .project-title {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #00f5ff, #4f46e5, #9333ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 3s ease-in-out infinite alternate;
            text-align: center;
            z-index: 2;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px rgba(79,70,229,0.6); }
            to { text-shadow: 0 0 30px rgba(147,51,234,0.9); }
        }

        /* Glass Login Card */
        .login-card {
            position: relative;
            background: rgba(255, 255, 255, 0.1);
            padding: 50px;
            width: 400px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            box-shadow: 0 15px 60px rgba(0,0,0,0.7);
            text-align: center;
            color: white;
            z-index: 2;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card h2 {
            margin-bottom: 30px;
            font-weight: 600;
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            color: white;
            background: linear-gradient(45deg, #2563eb, #1e40af);
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 30px rgba(37, 99, 235, 0.7);
        }

        .error-msg {
            margin-top: 15px;
            color: #ff4d4d;
            font-size: 13px;
        }

        @media(max-width: 500px){
            .login-card {
                width: 90%;
                padding: 30px;
            }

            .project-title {
                font-size: 22px;
                padding: 0 10px;
            }
        }

    </style>
</head>

<body>

<div class="project-title">
    SMART INFRASTRUCTURE INTELLIGENCE PLATFORM
</div>

<div class="login-card">
    <h2>Admin Secure Login</h2>

    <form th:action="@{/login}" method="post">

        <div class="input-group">
            <input type="text" name="username" placeholder="Username" required>
        </div>

        <div class="input-group">
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>

        <div class="error-msg" th:if="${error}" th:text="${error}"></div>

    </form>
</div>

</body>
</html>
